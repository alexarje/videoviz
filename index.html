<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoViz - Live Videogram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>VideoViz</h1>
      </header>

      <section class="controls" aria-label="Camera controls">
        <button id="startBtn" type="button">Start Camera</button>
        <button id="stopBtn" type="button" disabled>Stop Camera</button>
        <label class="mirror-toggle">
          <input id="mirrorCheckbox" type="checkbox" /> Mirror
        </label>
        <label class="density-control" for="sampleWidthRange">
          Sample width
          <input id="sampleWidthRange" type="range" min="96" max="480" step="16" value="320" />
          <span id="sampleWidthValue">320 px</span>
        </label>
      </section>

      <section class="panels" aria-live="polite">
        <article class="panel">
          <h2>Camera Feed</h2>
          <video id="cameraVideo" autoplay playsinline muted></video>
        </article>

        <article class="panel">
          <h2>Videogram (Rolling Window)</h2>
          <canvas id="videogramCanvas" width="320" height="240"></canvas>
        </article>
      </section>


      <p id="statusText" class="status"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
