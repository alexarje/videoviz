<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoViz - Live Videogram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>VideoViz</h1>
      </header>

      <section class="controls" aria-label="Camera controls">
        <button id="toggleCameraBtn" type="button">Start Camera</button>
        <label class="mirror-toggle">
          <input id="mirrorCheckbox" type="checkbox" /> Mirror
        </label>
        <label class="density-control" for="sampleWidthRange">
          Sample width
          <input id="sampleWidthRange" type="range" min="96" max="1920" step="16" value="320" />
          <span id="sampleWidthValue">320 px</span>
        </label>
        <label class="duration-control" for="durationRange">
          Duration
          <input id="durationRange" type="range" min="16" max="512" step="1" value="80" />
          <span id="durationValue">80</span> frames
        </label>
      </section>


      <section class="panels" aria-live="polite">
        <article class="panel panel-video">
          <h2>Camera Feed</h2>
          <video id="cameraVideo" autoplay playsinline muted></video>
        </article>

        <article class="panel panel-videogram-vert">
          <h2>Videogram (Vertical Avg)</h2>
          <canvas id="videogramCanvasVert"></canvas>
        </article>

        <article class="panel panel-videogram-horiz">
          <h2>Videogram (Horizontal Avg)</h2>
          <canvas id="videogramCanvas"></canvas>
        </article>
      </section>


      <p id="statusText" class="status"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
