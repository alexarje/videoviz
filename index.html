<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoViz - Live Videogram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>VideoViz</h1>
      </header>


      <section class="controls" aria-label="Camera controls">
        <button id="toggleCameraBtn" type="button">Start Camera</button>
        <label class="mirror-toggle">
          <input id="mirrorCheckbox" type="checkbox" /> Mirror
        </label>
        <label class="diff-toggle">
          <input id="diffCheckbox" type="checkbox" /> Frame Differencing
        </label>
        <label class="threshold-control">
          Threshold
          <input id="diffThreshold" type="range" min="0" max="255" value="0" />
          <span id="diffThresholdValue">0</span>
        </label>
        <label class="normalize-toggle">
          <input id="normalizeCheckbox" type="checkbox" checked /> Normalize
        </label>
      </section>



      <section class="main-content" aria-live="polite">
        <!-- Hidden video element is used as the camera source only -->
        <video id="cameraVideo" autoplay playsinline muted style="display: none;"></video>

        <div class="viz-grid">
          <div class="viz-block">
            <h2>Camera / Motion</h2>
            <canvas id="viewCanvas" width="480" height="480"></canvas>
          </div>

          <div class="viz-block">
            <h2>Videogram (Horizontal Avg)</h2>
            <canvas id="videogramCanvas" width="480" height="480"></canvas>
          </div>

          <div class="viz-block">
            <h2>Videogram (Vertical Avg)</h2>
            <canvas id="videogramCanvasVert" width="480" height="480"></canvas>
          </div>

          <div class="viz-block">
            <h2>Self-similarity</h2>
            <canvas id="selfSimCanvas" width="480" height="480"></canvas>
          </div>
        </div>
      </section>


    </main>

    <script src="app.js"></script>
  </body>
</html>
