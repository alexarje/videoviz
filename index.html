<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoViz - Live Videogram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <h1>VideoViz</h1>
      </header>


      <section class="controls" aria-label="Camera controls">
        <button id="toggleCameraBtn" type="button">Start Camera</button>
        <label class="mirror-toggle">
          <input id="mirrorCheckbox" type="checkbox" /> Mirror
        </label>
        <label class="duration-control" for="durationRange">
          Duration
          <input id="durationRange" type="range" min="16" max="512" step="1" value="80" />
          <span id="durationValue">80</span> frames
        </label>
        <label class="diff-toggle">
          <input id="diffCheckbox" type="checkbox" /> Frame Differencing
        </label>
        <label class="threshold-control">
          Threshold
          <input id="diffThreshold" type="range" min="0" max="255" value="24" />
          <span id="diffThresholdValue">24</span>
        </label>
        <label class="normalize-toggle">
          <input id="normalizeCheckbox" type="checkbox" checked /> Normalize
        </label>
      </section>



      <section class="main-content" aria-live="polite">
        <div class="top-row">
          <div class="video-and-horiz">
            <div class="video-block video-stack">
              <h2>Camera Feed</h2>
              <div class="video-stack-inner">
                <video id="cameraVideo" autoplay playsinline muted style="display: block;"></video>
                <canvas id="diffVideoCanvas" width="320" height="240" style="display: none;"></canvas>
              </div>
            </div>
            <div class="videogram-horiz-block">
              <h2>Videogram (Horizontal Avg)</h2>
              <canvas id="videogramCanvas"></canvas>
            </div>
          </div>
          <div class="videogram-vert-block">
            <h2>Videogram (Vertical Avg)</h2>
            <canvas id="videogramCanvasVert"></canvas>
          </div>
        </div>
        <!-- Removed duplicate diff video block -->
      </section>


    </main>

    <script src="app.js"></script>
  </body>
</html>
